# nplex configuration file.
# see https://github.com/torrentg/nplex

addr = localhost:14022
log-level = info
max-clients = 128
disable-fsync = false

# number of entries/bytes before force a flush
# these values only applies if it cumulates more than x entries/bytes
write-queue-max-length = 1000
write-queue-max-bytes = 350MB
flush-max-entries = 50
flush-max-bytes = 25MB

# criteria to create a snapshot considering the cumulated entries from previous snapshot
;snapshot-max-entries = 10000
;snapshot-max-bytes = 100MB

[defaults]
active = true
can-force = false
max-connections = 3
# session default values
keepalive-millis = 1000
timeout-factor = 3.0
max-msg-length = 4MB
max-unack-msgs = 100
max-unack-bytes = 10MB

[admin]
password = s3cr3t
can-force = true
keepalive-millis = 250
timeout-factor = 0
max-connections = 256
acl = crud:**

[jdoe]
password = s3cr3t
