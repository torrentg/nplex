# nplex configuration file.
# see https://github.com/torrentg/nplex

addr = localhost:14022
log-level = info
max-clients = 128
disable-fsync = false

# number of entries/bytes before force a flush
# these values only applies if it cumulates more than x entries/bytes
;max-flush-entries = 50
;max-flush-bytes = 10MB

# entries pending to be committed
;max-uncommited-entries = 1024
;max-uncommited-bytes = 20MB

# criteria to create a snapshot considering the cumulated entries from previous snapshot
;max-snapshot-entries = 10000
;max-snapshot-bytes = 100MB

[defaults]
active = true
can-force = false
max-connections = 3
# session default values
keepalive-millis = 1000
timeout-factor = 3.0
max-msg-length = 4MB
max-unack-msgs = 100
max-unack-bytes = 10MB

[admin]
password = s3cr3t
can-force = true
keepalive-millis = 250
timeout-factor = 0
max-connections = 256
acl = crud:**

